author: "maledziecko"

raid:
  health-multiplier: 1.50   # Globalny mnożnik bazowego HP
  damage-multiplier: 2.50   # Domyślny mnożnik obrażeń
  extra-mobs-multiplier: 2  # Liczba dodatkowych mobów na każdy spawn

# Bazowa ilość punktów życia (HP) dla każdego typu moba
mobs-base-hp:
  RAVAGER: 100.0     
  EVOKER: 40.0       
  VINDICATOR: 35.0   
  ILLUSIONER: 32.0   
  WITCH: 30.0        
  PILLAGER: 24.0     

# Indywidualny mnożnik obrażeń dla każdego moba
mobs-damage-multiplier:
  RAVAGER: 3.0       
  EVOKER: 2.0        
  VINDICATOR: 2.5    
  ILLUSIONER: 2.0    
  WITCH: 1.5         
  PILLAGER: 4.0      

# Procentowe szanse na spawnowanie konkretnych mobów dla każdej z 10 fal (Suma w każdej fali powinna wynosić 100)
