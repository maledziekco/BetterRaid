# ==========================================
#         BetterRaid - Konfiguracja
# ==========================================

raid:
  health-multiplier: 1.50   # Mnożnik bazowego HP dla wszystkich mobów z rajdu (np. 1.50 = +50% życia)
  damage-multiplier: 2.50   # Moby biją o 150% mocniej (2.5x silniejsze ciosy!)
  extra-mobs-multiplier: 2  # Dwa dodatkowe moby na każdy spawn (+200% więcej mobów!)

# Bazowa ilość punktów życia (HP) dla każdego typu moba
mobs-base-hp:
  RAVAGER: 100.0     # Dewastator
  EVOKER: 40.0       # Przywoływacz
  VINDICATOR: 35.0   # Siekacz
  ILLUSIONER: 32.0   # Iluzjonista
  WITCH: 30.0        # Czarownica
  PILLAGER: 24.0     # Kusznik

messages:
  prefix: "&8[&cBetterRaid&8] "
  no-permission: "&cBrak uprawnień!"
  config-reloaded: "&aPrzeładowano config!"
  raid-started: "&aRozpoczęto rajd z potężnymi falami!"
  boss-spawned: "&cZespawnowano Bossa!"
  boss-defeated: "&aBoss został pokonany!"